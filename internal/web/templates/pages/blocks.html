{{define "blocks-content"}}
<div id="blocks-page">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">Blocks</h1>
    </div>

    <div class="card p-5">
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead id="blocks-table-head">
                    <tr>
                        <th class="text-left py-2 px-3">Height</th>
                        <th class="text-left py-2 px-3">Hash</th>
                        <th class="text-left py-2 px-3">Time</th>
                        <th class="text-right py-2 px-3">Txs</th>
                        <th class="text-right py-2 px-3">Size</th>
                        <th class="text-right py-2 px-3">Difficulty</th>
                    </tr>
                </thead>
                <tbody id="blocks-table-body">
                    <tr><td colspan="6" class="py-4 text-center text-slate-500">No data loaded.</td></tr>
                </tbody>
            </table>
        </div>
        <div class="mt-4 text-center">
            <button id="load-more-btn" class="refresh-btn px-4 py-2" onclick="loadMoreBlocks()" style="display:none;">
                Load More
            </button>
        </div>
    </div>
</div>
{{end}}
