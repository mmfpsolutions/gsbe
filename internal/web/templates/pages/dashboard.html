{{define "dashboard-content"}}
<div id="dashboard-page">
    <h1 class="text-2xl font-bold mb-6">Dashboard</h1>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
        <!-- Chain Info Card -->
        <div class="card p-5">
            <h2 class="text-lg font-semibold mb-4 text-slate-300">Chain Info</h2>
            <div id="chain-info-content" class="space-y-3">
                <p class="text-slate-500">Select a node and click Refresh to load data.</p>
            </div>
        </div>

        <!-- Mempool Summary Card -->
        <div class="card p-5">
            <h2 class="text-lg font-semibold mb-4 text-slate-300">Mempool Summary</h2>
            <div id="mempool-summary-content" class="space-y-3">
                <p class="text-slate-500">No data loaded.</p>
            </div>
        </div>
    </div>

    <!-- Recent Blocks -->
    <div class="card p-5">
        <h2 class="text-lg font-semibold mb-4 text-slate-300">Recent Blocks</h2>
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                    <tr>
                        <th class="text-left py-2 px-3">Height</th>
                        <th class="text-left py-2 px-3">Hash</th>
                        <th class="text-left py-2 px-3">Time</th>
                        <th class="text-right py-2 px-3">Txs</th>
                        <th class="text-right py-2 px-3">Size</th>
                    </tr>
                </thead>
                <tbody id="recent-blocks-body">
                    <tr><td colspan="5" class="py-4 text-center text-slate-500">No data loaded.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{{end}}
