{{define "tx-detail-content"}}
<div id="tx-detail-page" data-txid="{{.TxID}}" data-blockhash="{{.Query}}">
    <div class="flex items-center gap-3 mb-6">
        <a href="javascript:history.back()" class="text-blue-400 hover:text-blue-300">&larr; Back</a>
        <h1 class="text-2xl font-bold">Transaction Detail</h1>
    </div>

    <!-- Transaction Summary -->
    <div class="card p-5 mb-6">
        <h2 class="text-lg font-semibold mb-4 text-slate-300">Summary</h2>
        <div id="tx-summary-content" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <p class="text-slate-500">Loading...</p>
        </div>
    </div>

    <!-- Inputs -->
    <div class="card p-5 mb-6">
        <h2 class="text-lg font-semibold mb-4 text-slate-300">
            Inputs <span id="input-count-badge" class="badge badge-blue"></span>
        </h2>
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                    <tr>
                        <th class="text-left py-2 px-3">#</th>
                        <th class="text-left py-2 px-3">Source TxID</th>
                        <th class="text-right py-2 px-3">Vout</th>
                        <th class="text-left py-2 px-3">Type</th>
                    </tr>
                </thead>
                <tbody id="tx-inputs-body">
                    <tr><td colspan="4" class="py-4 text-center text-slate-500">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Outputs -->
    <div class="card p-5">
        <h2 class="text-lg font-semibold mb-4 text-slate-300">
            Outputs <span id="output-count-badge" class="badge badge-blue"></span>
        </h2>
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                    <tr>
                        <th class="text-left py-2 px-3">#</th>
                        <th class="text-right py-2 px-3">Value</th>
                        <th class="text-left py-2 px-3">Address</th>
                        <th class="text-left py-2 px-3">Type</th>
                    </tr>
                </thead>
                <tbody id="tx-outputs-body">
                    <tr><td colspan="4" class="py-4 text-center text-slate-500">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{{end}}
