{{define "header"}}
<header class="header-gradient sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4">
        <div class="flex items-center justify-between h-14">
            <!-- Logo -->
            <a href="/dashboard" class="flex items-center gap-2 text-lg font-bold text-amber-400 no-underline">
                <span>GSBE</span>
            </a>

            <!-- Node Selector -->
            <div class="flex items-center gap-2">
                <select id="node-selector" class="text-sm rounded px-2 py-1">
                    <option value="">Select Node...</option>
                </select>
            </div>

            <!-- Navigation -->
            <nav class="flex items-center gap-1">
                <a href="/dashboard" class="nav-link {{if eq .ActivePage "dashboard"}}active{{end}}">Dashboard</a>
                <a href="/blocks" class="nav-link {{if or (eq .ActivePage "blocks") (eq .ActivePage "block-detail")}}active{{end}}">Blocks</a>
                <a href="/mempool" class="nav-link {{if eq .ActivePage "mempool"}}active{{end}}">Mempool</a>
            </nav>

            <!-- Search & Actions -->
            <div class="flex items-center gap-3">
                <form id="search-form" class="flex items-center" onsubmit="handleSearch(event)">
                    <input type="text" id="search-input" placeholder="Search height or hash..."
                           class="text-sm rounded-l px-3 py-1.5 w-56">
                    <button type="submit" class="refresh-btn rounded-l-none rounded-r text-sm px-3 py-1.5">
                        Search
                    </button>
                </form>
                <a href="/config" class="nav-link {{if eq .ActivePage "config"}}active{{end}}" title="Configuration">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                </a>
                <button id="refresh-btn" class="refresh-btn text-sm" onclick="handleRefresh()" title="Refresh Data">
                    <svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                    Refresh
                </button>
            </div>
        </div>
    </div>
</header>
{{end}}
